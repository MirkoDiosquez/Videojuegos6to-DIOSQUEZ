<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="320" height="240">

  <!-- fondo negro con borde rojo doble -->
  <rect x="0" y="0" width="320" height="240" fill="#000011"/>
  <rect x="0" y="0" width="320" height="240" fill="none" stroke="#ff0000" stroke-width="4"/>
  <rect x="6" y="6" width="308" height="228" fill="none" stroke="#880000" stroke-width="1.5"/>

  <!-- scanlines CRT -->
  <rect x="0" y="0" width="320" height="240" fill="url(#scan)" opacity="0.15"/>

  <!-- sombra texto GAME -->
  <text x="163" y="88" text-anchor="middle" font-family="monospace" font-size="48" font-weight="bold" fill="#440000" letter-spacing="5">GAME</text>
  <text x="163" y="142" text-anchor="middle" font-family="monospace" font-size="48" font-weight="bold" fill="#440000" letter-spacing="5">OVER</text>

  <!-- texto GAME OVER rojo -->
  <text x="160" y="85" text-anchor="middle" font-family="monospace" font-size="48" font-weight="bold" fill="#ff0000" letter-spacing="5">GAME</text>
  <text x="160" y="139" text-anchor="middle" font-family="monospace" font-size="48" font-weight="bold" fill="#ff0000" letter-spacing="5">OVER</text>

  <!-- línea punteada separadora -->
  <line x1="20" y1="158" x2="300" y2="158" stroke="#ff0000" stroke-width="1.5" stroke-dasharray="6,5"/>

  <!-- INSERT COIN -->
  <text x="160" y="185" text-anchor="middle" font-family="monospace" font-size="13" fill="#ffff00" letter-spacing="2">- INSERT COIN -</text>

  <!-- botón REINICIAR -->
  <rect x="80" y="200" width="160" height="30" fill="#000011"/>
  <rect x="80" y="200" width="160" height="30" fill="none" stroke="#00ff00" stroke-width="2"/>
  <rect x="82" y="202" width="156" height="26" fill="none" stroke="#004400" stroke-width="1"/>
  <text x="160" y="220" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#00ff00" letter-spacing="2">REINICIAR</text>

</svg>
